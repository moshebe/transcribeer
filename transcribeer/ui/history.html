<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="shared.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; background: var(--bg-window); }

    /* ── Layout ── */
    .split { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 200px;
      max-width: 380px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .search-wrap {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-wrap input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      background: white;
      outline: none;
      font-size: 12px;
    }
    .search-wrap input:focus { border-color: var(--accent); }

    .session-list { flex: 1; overflow-y: auto; }
    .session-row {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .session-row:hover { background: rgba(0,0,0,0.04); }
    .session-row.selected { background: var(--bg-selected); }

    .session-row .name {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--fg-primary);
    }
    .session-row.selected .name,
    .session-row.selected .meta,
    .session-row.selected .snippet { color: white; }
    .session-row .name.untitled { color: var(--fg-secondary); font-weight: 400; }
    .session-row .meta {
      font-size: 10px; color: var(--fg-secondary); margin-top: 2px;
    }
    .session-row .snippet {
      font-size: 10px; color: var(--fg-secondary);
      font-style: italic; margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .session-row.selected .snippet { color: rgba(255,255,255,0.75); }
    .empty-state {
      padding: 32px 16px; text-align: center;
      font-size: 12px; color: var(--fg-secondary);
    }

    /* ── Detail panel ── */
    .detail {
      flex: 1; display: flex; flex-direction: column;
      background: white; overflow: hidden;
    }

    .detail-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .detail-header input.name-input {
      width: 100%; border: none; outline: none;
      font-size: 17px; font-weight: 600;
      color: var(--fg-primary); background: transparent;
      padding: 0; margin-bottom: 3px;
    }
    .detail-header input.name-input::placeholder { color: #bbb; }
    .detail-meta { font-size: 11px; color: var(--fg-secondary); }

    .notes-wrap {
      padding: 10px 20px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .notes-wrap textarea {
      width: 100%; border: none; outline: none;
      font-size: 12px; color: var(--fg-primary);
      background: transparent; resize: none;
      line-height: 1.5; min-height: 48px;
    }
    .notes-wrap textarea::placeholder { color: #bbb; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .tab-bar button {
      flex: 1; padding: 8px;
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      font-size: 12px; color: var(--fg-secondary);
      cursor: pointer;
    }
    .tab-bar button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Content area ── */
    .content-area {
      flex: 1; overflow-y: auto; padding: 14px 20px;
    }
    .content-area pre {
      font-family: Menlo, monospace; font-size: 12px;
      white-space: pre-wrap; line-height: 1.6;
      color: var(--fg-primary);
    }
    .content-area .prose {
      font-size: 13px; line-height: 1.7;
      color: var(--fg-primary);
    }
    .content-empty {
      font-size: 12px; color: var(--fg-secondary);
      font-style: italic;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 20px;
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .status-label {
      flex: 1; font-size: 11px; color: var(--fg-secondary);
    }

    /* ── No-selection placeholder ── */
    .no-selection {
      flex: 1; display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--fg-secondary);
      background: white;
    }
  </style>
</head>
<body>

<div class="split">

  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:10px 12px 6px;font-weight:600;font-size:13px;color:var(--text-primary)">🍺 Transcribeer</div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search sessions…"
             oninput="onSearch(this.value)">
    </div>
    <div class="session-list" id="session-list">
      <div class="empty-state">No recordings yet.</div>
    </div>
  </div>

  <!-- Detail -->
  <div id="detail-placeholder" class="no-selection">
    Select a recording to view details.
  </div>

  <div id="detail-panel" class="detail" style="display:none;">
    <div class="detail-header">
      <input id="inp-name" class="name-input" type="text" placeholder="Session name"
             onblur="onRenameSave()">
      <div id="lbl-meta" class="detail-meta">—</div>
    </div>
    <div class="notes-wrap">
      <textarea id="txt-notes" placeholder="Add notes…" rows="2"
                onblur="onNotesSave()"></textarea>
    </div>
    <div class="tab-bar">
      <button id="tab-summary" class="active" onclick="switchContentTab('summary')">Summary</button>
      <button id="tab-transcript" onclick="switchContentTab('transcript')">Transcript</button>
    </div>
    <div class="content-area" id="content-area"></div>
    <div class="bottom-bar">
      <span id="status-label" class="status-label"></span>
      <button id="btn-transcribe" class="btn" onclick="onTranscribe()">Re-transcribe</button>
      <button id="btn-summarize" class="btn" onclick="onSummarize()">Re-summarize</button>
    </div>
  </div>

</div>

<script>
let _sessions = [];       // [{path, name, date, duration, snippet, untitled}]
let _selected = null;     // session path string
let _currentTab = "summary";
let _sessionData = null;  // last received session_data payload

// ── Rendering ────────────────────────────────────────────────────────────────

function renderList(sessions) {
  _sessions = sessions;
  const list = document.getElementById("session-list");
  if (!sessions.length) {
    list.innerHTML = '<div class="empty-state">No recordings found.</div>';
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="session-row${s.path === _selected ? " selected" : ""}"
         onclick="selectSession('${s.path.replace(/'/g, "\\'")}')">
      <div class="name${s.untitled ? " untitled" : ""}">${escHtml(s.name)}</div>
      <div class="meta">${escHtml(s.date)}${s.duration ? " · " + escHtml(s.duration) : ""}</div>
      ${s.snippet ? `<div class="snippet">${escHtml(s.snippet)}</div>` : ""}
    </div>
  `).join("");
}

function renderDetail(d) {
  _sessionData = d;
  document.getElementById("detail-placeholder").style.display = "none";
  document.getElementById("detail-panel").style.display = "flex";
  document.getElementById("inp-name").value = d.name || "";
  document.getElementById("lbl-meta").textContent =
    [d.date, d.duration].filter(Boolean).join(" · ");
  document.getElementById("txt-notes").value = d.notes || "";
  document.getElementById("btn-transcribe").disabled = !d.can_transcribe;
  document.getElementById("btn-summarize").disabled = !d.can_summarize;
  document.getElementById("status-label").textContent = "";
  showContentTab(_currentTab, d);
}

function showContentTab(tab, d) {
  _currentTab = tab;
  d = d || _sessionData;
  document.getElementById("tab-summary").classList.toggle("active", tab === "summary");
  document.getElementById("tab-transcript").classList.toggle("active", tab === "transcript");
  const area = document.getElementById("content-area");
  if (tab === "summary") {
    if (d && d.summary) {
      area.innerHTML = `<div class="prose">${escHtml(d.summary).replace(/\n/g, "<br>")}</div>`;
    } else {
      area.innerHTML = '<span class="content-empty">No summary yet.</span>';
    }
  } else {
    if (d && d.transcript) {
      area.innerHTML = `<pre>${escHtml(d.transcript)}</pre>`;
    } else {
      area.innerHTML = '<span class="content-empty">No transcript yet.</span>';
    }
  }
}

function switchContentTab(tab) { showContentTab(tab, _sessionData); }

// ── User actions ─────────────────────────────────────────────────────────────

function selectSession(path) {
  _selected = path;
  renderList(_sessions);  // update highlight
  bridge("select", {session: path});
}

function onSearch(q) {
  bridge("search", {query: q});
}

function onRenameSave() {
  if (!_selected) return;
  bridge("rename", {session: _selected, name: document.getElementById("inp-name").value.trim()});
}

function onNotesSave() {
  if (!_selected) return;
  bridge("save_notes", {session: _selected, notes: document.getElementById("txt-notes").value});
}

function onTranscribe() {
  if (!_selected) return;
  document.getElementById("btn-transcribe").disabled = true;
  document.getElementById("status-label").textContent = "Transcribing…";
  bridge("transcribe", {session: _selected});
}

function onSummarize() {
  if (!_selected) return;
  document.getElementById("btn-summarize").disabled = true;
  document.getElementById("status-label").textContent = "Summarizing…";
  bridge("summarize", {session: _selected});
}

function bridge(action, payload) {
  window.webkit.messageHandlers.bridge.postMessage({action, payload});
}

function escHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Receive from Python ───────────────────────────────────────────────────────

window.receive = function({action, payload}) {
  if (action === "init") {
    renderList(payload.sessions || []);
    // auto-select first session
    if (payload.sessions && payload.sessions.length) {
      const first = payload.sessions[0];
      _selected = first.path;
      renderList(payload.sessions);
      bridge("select", {session: first.path});
    }
  } else if (action === "sessions") {
    renderList(payload.sessions || []);
  } else if (action === "session_data") {
    renderDetail(payload);
  } else if (action === "progress") {
    const pct = payload.pct != null ? " " + Math.round(payload.pct * 100) + "%" : "";
    document.getElementById("status-label").textContent = payload.label + pct;
  } else if (action === "done") {
    bridge("select", {session: _selected});  // reload detail
    document.getElementById("status-label").textContent =
      payload.step === "transcribe" ? "Transcription done." : "Summary done.";
  }
};
</script>
</body>
</html>
