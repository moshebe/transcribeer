<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--bg-window); }

    /* ── Toolbar tabs ── */
    .toolbar {
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 10px 20px;
      background: #e8e8ea;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 80px;
      padding: 6px 14px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      font-size: 11px;
      color: #555;
    }
    .tab-btn .icon { font-size: 18px; }
    .tab-btn.active {
      background: white;
      border-color: #c0c0c0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      color: var(--fg-primary);
    }

    /* ── Tab panels ── */
    .panel { display: none; padding: 24px 28px; background: white; }
    .panel.active { display: block; }
    .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .panel-subtitle { font-size: 12px; color: var(--fg-secondary); margin-bottom: 18px; }

    /* ── Footer ── */
    .footer {
      padding: 10px 28px;
      background: var(--bg-window);
      border-top: 1px solid var(--border);
      text-align: right;
      font-size: 11px;
      color: var(--fg-secondary);
    }

    /* ── Hidden conditional rows ── */
    .row-hidden { display: none; }
  </style>
</head>
<body>

<div class="toolbar">
  <button class="tab-btn active" data-panel="pipeline" onclick="switchTab(this)">
    <span class="icon">⚡</span> Pipeline
  </button>
  <button class="tab-btn" data-panel="transcription" onclick="switchTab(this)">
    <span class="icon">🍺</span> Transcription
  </button>
  <button class="tab-btn" data-panel="summarization" onclick="switchTab(this)">
    <span class="icon">✍️</span> Summarization
  </button>
</div>

<!-- Pipeline -->
<div id="panel-pipeline" class="panel active">
  <div class="panel-title">Pipeline</div>
  <div class="panel-subtitle">Choose which steps run automatically after recording.</div>

  <label class="toggle-row" style="cursor:default;opacity:0.5;">
    <div class="label-group">
      <div class="title">Record</div>
      <div class="subtitle">Always enabled</div>
    </div>
    <div class="toggle"><input type="checkbox" checked disabled><span class="toggle-track"></span></div>
  </label>

  <label class="toggle-row" onclick="onPipelineChange()">
    <div class="label-group">
      <div class="title">Transcribe</div>
      <div class="subtitle">Convert audio to text after recording</div>
    </div>
    <div class="toggle"><input id="chk-transcribe" type="checkbox"><span class="toggle-track"></span></div>
  </label>

  <label class="toggle-row" id="row-summarize" onclick="onPipelineChange()">
    <div class="label-group">
      <div class="title">Summarize</div>
      <div class="subtitle">Generate a summary from the transcript</div>
    </div>
    <div class="toggle"><input id="chk-summarize" type="checkbox"><span class="toggle-track"></span></div>
  </label>
</div>

<!-- Transcription -->
<div id="panel-transcription" class="panel">
  <div class="panel-title">Transcription</div>
  <div class="panel-subtitle">Configure how audio is converted to text.</div>

  <div class="form-row">
    <label>Speaker detection</label>
    <select id="sel-diarization" onchange="save('diarization', this.value); updateDiarDesc()">
      <option value="resemblyzer">resemblyzer</option>
      <option value="none">none</option>
    </select>
  </div>
  <div class="help-text" id="diar-desc"></div>
</div>

<!-- Summarization -->
<div id="panel-summarization" class="panel">
  <div class="panel-title">Summarization</div>
  <div class="panel-subtitle">Configure the AI backend used for summaries.</div>

  <div class="form-row">
    <label>Backend</label>
    <select id="sel-backend" onchange="save('llm_backend', this.value); updateBackendUI()">
      <option value="ollama">ollama</option>
      <option value="openai">openai</option>
      <option value="anthropic">anthropic</option>
    </select>
  </div>

  <div class="form-row">
    <label>Model</label>
    <input id="inp-model" type="text" placeholder="e.g. claude-opus-4"
           onblur="save('llm_model', this.value)">
  </div>

  <div class="form-row" id="row-ollama-host">
    <label>Ollama host</label>
    <input id="inp-ollama-host" type="text" placeholder="http://localhost:11434"
           onblur="save('ollama_host', this.value)">
  </div>

  <div class="form-row" id="row-api-key">
    <label>API key</label>
    <input id="inp-api-key" type="password" placeholder="Optional — overrides env variable"
           onblur="save('api_key', this.value)">
  </div>
  <div class="help-text row-hidden" id="api-key-help"></div>
</div>

<div class="footer">Changes save automatically</div>

<script>
const DIAR_DESCS = {
  resemblyzer: "Detects and labels multiple speakers in the transcript.",
  none: "Disabled — transcript will have a single unlabelled speaker.",
};

function switchTab(btn) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-" + btn.dataset.panel).classList.add("active");
}

function save(key, value) {
  window.webkit.messageHandlers.bridge.postMessage({action: "save", payload: {key, value}});
}

function onPipelineChange() {
  // Toggle state is updated by the browser after this click handler runs,
  // so we defer reading it slightly.
  setTimeout(() => {
    const doTx = document.getElementById("chk-transcribe").checked;
    const doSm = document.getElementById("chk-summarize").checked;
    const rowSm = document.getElementById("row-summarize");

    if (!doTx) {
      document.getElementById("chk-summarize").checked = false;
      rowSm.style.opacity = "0.5";
      rowSm.style.pointerEvents = "none";
      save("pipeline_mode", "record-only");
    } else {
      rowSm.style.opacity = "";
      rowSm.style.pointerEvents = "";
      if (doSm) {
        save("pipeline_mode", "record+transcribe+summarize");
      } else {
        save("pipeline_mode", "record+transcribe");
      }
    }
  }, 0);
}

function updateDiarDesc() {
  const val = document.getElementById("sel-diarization").value;
  document.getElementById("diar-desc").textContent = DIAR_DESCS[val] || "";
}

function updateBackendUI() {
  const backend = document.getElementById("sel-backend").value;
  const isOllama = backend === "ollama";
  document.getElementById("row-ollama-host").style.display = isOllama ? "" : "none";
  document.getElementById("row-api-key").style.display = isOllama ? "none" : "";
  const help = document.getElementById("api-key-help");
  if (!isOllama) {
    const envMap = {openai: "OPENAI_API_KEY", anthropic: "ANTHROPIC_API_KEY"};
    const env = envMap[backend] || backend.toUpperCase() + "_API_KEY";
    help.textContent = "Optional. The " + env + " environment variable will be used if blank.";
    help.classList.remove("row-hidden");
  } else {
    help.classList.add("row-hidden");
  }
}

// ── Receive from Python ──────────────────────────────────────────────────────
window.receive = function({action, payload}) {
  if (action === "init") {
    const c = payload;
    // Pipeline
    const doTx = c.pipeline_mode !== "record-only";
    const doSm = c.pipeline_mode === "record+transcribe+summarize";
    document.getElementById("chk-transcribe").checked = doTx;
    document.getElementById("chk-summarize").checked = doSm;
    if (!doTx) {
      const rowSm = document.getElementById("row-summarize");
      rowSm.style.opacity = "0.5";
      rowSm.style.pointerEvents = "none";
    }
    // Transcription
    const diarSel = document.getElementById("sel-diarization");
    diarSel.value = c.diarization || "resemblyzer";
    updateDiarDesc();
    // Summarization
    document.getElementById("sel-backend").value = c.llm_backend || "ollama";
    document.getElementById("inp-model").value = c.llm_model || "";
    document.getElementById("inp-ollama-host").value = c.ollama_host || "";
    document.getElementById("inp-api-key").value = c.api_key || "";
    updateBackendUI();
  }
};

updateDiarDesc();
updateBackendUI();
</script>
</body>
</html>
