name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write  # create GitHub Release + upload assets

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve version from tag
        id: version
        run: |
          # Support both tag push and manual dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"                # strip leading v
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app

      - name: Build release app bundle
        run: make build-release

      - name: Install create-dmg (optional, for prettier DMG)
        run: brew install create-dmg || true

      - name: Build DMG
        run: make dmg

      - name: Compute SHA-256
        id: sha
        run: |
          DMG="dist/Transcribeer-${{ steps.version.outputs.version }}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA"   >> "$GITHUB_OUTPUT"
          echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG="${{ steps.sha.outputs.dmg_path }}"

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Transcribeer $VERSION" \
            --generate-notes \
            "$DMG"

      - name: Open Cask update PR against homebrew-pkg
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          BRANCH="cask/transcribeer-${VERSION}"

          # Clone tap
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/moshebe/homebrew-pkg.git" \
            /tmp/homebrew-pkg

          cd /tmp/homebrew-pkg

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Write the cask
          mkdir -p Casks
          cat > Casks/transcribeer.rb <<RUBY
cask "transcribeer" do
  version "$VERSION"
  sha256 "$SHA"

  url "https://github.com/moshebe/transcribeer/releases/download/v#{version}/Transcribeer-#{version}.dmg"
  name "Transcribeer"
  desc "Local-first meeting transcription and summarization for macOS"
  homepage "https://github.com/moshebe/transcribeer"

  depends_on macos: :sequoia
  depends_on arch: :arm64

  app "Transcribeer.app"

  zap trash: [
    "~/.transcribeer",
    "~/Library/Preferences/com.transcribeer.menubar.plist",
    "~/Library/LaunchAgents/com.transcribeer.dev.plist",
  ]
end
RUBY

          git add Casks/transcribeer.rb
          git commit -m "chore: update transcribeer cask to $VERSION"
          git push origin "$BRANCH"

          # Open PR
          gh pr create \
            --repo moshebe/homebrew-pkg \
            --head "$BRANCH" \
            --base main \
            --title "chore: update transcribeer cask to $VERSION" \
            --body "Automated cask bump from release workflow.

- Version: \`$VERSION\`
- SHA-256: \`$SHA\`
- DMG: https://github.com/moshebe/transcribeer/releases/tag/v${VERSION}
" \
            --label "automated"
