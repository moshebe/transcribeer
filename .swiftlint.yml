# SwiftLint configuration for Transcribeer.
#
# Enforces Apple's Swift API Design Guidelines plus a pragmatic set of opt-in
# rules recommended by the community (realm/SwiftLint defaults, Kodeco,
# Airbnb). Adjust thresholds here rather than disabling rules inline.
#
# Run locally with:  make lint        (see Makefile)
# Auto-fix with:     make lint-fix
# CI wiring:         .github/workflows/lint.yml

# ---------------------------------------------------------------------------
# Scope
# ---------------------------------------------------------------------------

included:
  - gui/Sources
  - gui/Tests
  - capture/Sources
  - capture/Tests

excluded:
  - gui/.build
  - gui/.swiftpm
  - capture/.build
  - capture/.swiftpm
  - "**/Package.swift"
  - "**/*.generated.swift"

# ---------------------------------------------------------------------------
# Disabled default rules (explicit choices, not laziness)
# ---------------------------------------------------------------------------

disabled_rules:
  # SwiftUI bodies and Form sections legitimately nest deep; keep structural
  # rules but don't punish view composition.
  - multiple_closures_with_trailing_closure
  # Prefer readable descriptive names, e.g. `let a = AppConfig()` in tests.
  - identifier_name
  # We use `id`, `ip`, etc. intentionally; rule is noisy.
  - type_name
  # Trailing whitespace is handled by editor/format; don't fail lint on it.
  - trailing_whitespace

# ---------------------------------------------------------------------------
# Opt-in rules (industry-standard additions)
# ---------------------------------------------------------------------------

opt_in_rules:
  - anonymous_argument_in_multiline_closure
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

# ---------------------------------------------------------------------------
# Rule tuning
# ---------------------------------------------------------------------------

line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_comments: false
  ignores_interpolated_strings: true

file_length:
  warning: 600
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20
  ignores_case_statements: true

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 4

large_tuple:
  warning: 3
  error: 4

trailing_comma:
  mandatory_comma: true

# Force-unwrap & IUO are errors — flag them explicitly.
force_cast: error
force_try: error
force_unwrapping:
  severity: error
implicitly_unwrapped_optional:
  severity: error
  mode: all_except_iboutlets

reporter: "xcode"
